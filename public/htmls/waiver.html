<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga H'om • Waiver</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="layout--sidebar background">
  <aside class="sidebar">
    <a class="logo-wrap" href="/htmls/dashboard.html">
      <img src="../images/HomLogo.png" alt="Yoga H'om Logo" class="logo" />
    </a>

    <nav class="nav">
      <a id="dashboard" href="/htmls/dashboard.html">Dashboard</a>
      <a id="instructors" href="/htmls/instructor.html">Instructors</a>
      <a id="classes" href="/htmls/class-schedule.html">Classes</a>
      <a id="classCheckin" href="/htmls/class-checkin.html">Class Check-In</a>
      <a id="classRecords" href="/htmls/class-records.html">Class Records</a>
      <a id="customers" href="/htmls/customers.html">Customers</a>
      <a id="packageEdit" href="/htmls/package-edit.html">Packages</a>
      <a id="packageSales" href="/htmls/package-sales.html">Package Sales</a>
      <a id="userManagement" href="/htmls/user-management.html">User Management</a>
      <a id="waiver" href="/htmls/waiver.html" class="active">Waiver</a>
      <a id="logout" href="/logout">Logout</a>
    </nav>
  </aside>

  <main class="main-bg">
    <div class="overlay"></div>

    <section class="welcome-box" style="max-width: 900px;">
      <h1>Waiver</h1>
      <p id="roleLabel"><strong>Role:</strong> Loading...</p>
      <p id="pageMessage" class="error-message" style="display:none;"></p>

      <form id="waiverForm">
        <label for="waiverId">Waiver ID</label>
        <input type="text" id="waiverId" name="waiverId" readonly />

        <label for="customerId">Customer ID</label>
        <input type="text" id="customerId" name="customerId" placeholder="C001" />

        <label for="customerSearchBox">Customer Search</label>
        <input
          type="text"
          id="customerSearchBox"
          placeholder="Search by customer ID or name"
        />

        <div class="btn-row" style="justify-content:flex-start;">
          <button type="button" class="btn" id="customerSearchBtn">Search Customer</button>
          <button type="button" class="btn" id="loadMyProfile">Use My Account</button>
        </div>

        <label for="signedDate">Signed Date</label>
        <input type="date" id="signedDate" name="signedDate" required />

        <label for="accepted">Waiver Accepted</label>
        <select id="accepted" name="accepted" class="styled-select">
          <option value="true">Accepted</option>
          <option value="false">Not Accepted</option>
        </select>

        <div class="btn-row">
          <button type="submit" class="btn btn--primary">Save Waiver</button>
          <button type="button" class="btn" id="newWaiver">New</button>
        </div>
      </form>

      <div id="customerPreview" style="margin-top: 1.5rem; text-align:left;"></div>
    </section>
  </main>

  <script>
    let currentUser = null;

    const pageMessage = document.getElementById("pageMessage");

    function showMessage(message, isError = false) {
      pageMessage.textContent = message;
      pageMessage.style.display = "block";
      pageMessage.style.background = isError ? "#fdeaea" : "#e8f7ee";
      pageMessage.style.color = isError ? "#b42318" : "#166534";
      pageMessage.style.borderColor = isError ? "#f5c2c0" : "#b7ebc6";
    }

    function hideRestrictedLinks(user) {
      const memberHidden = [
        "instructors",
        "classRecords",
        "customers",
        "packageEdit",
        "packageSales",
        "userManagement"
    ];

      if (user.role === "member") {
        memberHidden.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = "none";
        });
      }
    }

    async function loadUser() {
      const res = await fetch("/api/me");
      if (!res.ok) {
        window.location.href = "/index.html";
        return null;
      }

      currentUser = await res.json();

      document.getElementById("roleLabel").innerHTML =
        "<strong>Role:</strong> " + (currentUser.role || "Unknown");

      hideRestrictedLinks(currentUser);

      if (currentUser.role === "member") {
        document.getElementById("customerId").value = currentUser.customerId || "";
        document.getElementById("customerId").readOnly = true;
        document.getElementById("customerSearchBox").style.display = "none";
        document.getElementById("customerSearchBtn").style.display = "none";
      }

      return currentUser;
    }

    function renderCustomerPreview(customer) {
      const preview = document.getElementById("customerPreview");

      if (!customer) {
        preview.innerHTML = "";
        return;
      }

      preview.innerHTML = `
        <div class="card" style="max-width:none; padding:1rem;">
          <strong>${customer.customerId}</strong><br>
          ${customer.firstName || ""} ${customer.lastName || ""}<br>
          ${customer.email || ""}<br>
          ${customer.phone || ""}
        </div>
      `;
    }

    async function loadCustomerById(customerId) {
      const res = await fetch(`/api/customer/getCustomer?customerId=${encodeURIComponent(customerId)}`);
      const data = await res.json();

      if (!res.ok) {
        renderCustomerPreview(null);
        showMessage(data.message || data.error || "Customer not found.", true);
        return null;
      }

      document.getElementById("customerId").value = data.customerId || "";
      renderCustomerPreview(data);
      showMessage("Customer loaded.");
      return data;
    }

    async function searchCustomer() {
      const search = document.getElementById("customerSearchBox").value.trim();

      if (!search) {
        showMessage("Enter a customer ID or name to search.", true);
        return;
      }

      const res = await fetch(`/api/customer/search?search=${encodeURIComponent(search)}`);
      const data = await res.json();

      if (!res.ok || !Array.isArray(data) || data.length === 0) {
        renderCustomerPreview(null);
        showMessage(data.message || "No customer found.", true);
        return;
      }

      const customer = data[0];
      document.getElementById("customerId").value = customer.customerId || "";
      renderCustomerPreview(customer);
      showMessage("Customer loaded.");
    }

    async function useMyAccount() {
      if (!currentUser || !currentUser.customerId) {
        showMessage("No linked customer account found.", true);
        return;
      }

      await loadCustomerById(currentUser.customerId);
    }

    async function getNextWaiverId() {
      try {
        const res = await fetch("/api/waiver/getNextId");
        const data = await res.json();

        if (res.ok) {
          document.getElementById("waiverId").value = data.nextId || "";
          return;
        }
      } catch (err) {
        // fallback below
      }

      document.getElementById("waiverId").value = "W001";
    }

    async function saveWaiver(event) {
      event.preventDefault();

      const payload = {
        waiverId: document.getElementById("waiverId").value.trim(),
        customerId: document.getElementById("customerId").value.trim(),
        signedDate: document.getElementById("signedDate").value,
        accepted: document.getElementById("accepted").value === "true"
      };

      try {
        const res = await fetch("/api/waiver/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.message || data.error || "Failed to save waiver.", true);
          return;
        }

        showMessage("Waiver saved successfully.");
        document.getElementById("waiverForm").reset();
        renderCustomerPreview(null);

        if (currentUser && currentUser.role === "member") {
          document.getElementById("customerId").value = currentUser.customerId || "";
        }

        const today = new Date().toISOString().split("T")[0];
        document.getElementById("signedDate").value = today;
        document.getElementById("accepted").value = "true";
        await getNextWaiverId();
      } catch (err) {
        showMessage("Waiver backend is not wired yet.", true);
      }
    }

    function resetForm() {
      document.getElementById("waiverForm").reset();
      renderCustomerPreview(null);

      const today = new Date().toISOString().split("T")[0];
      document.getElementById("signedDate").value = today;
      document.getElementById("accepted").value = "true";

      if (currentUser && currentUser.role === "member") {
        document.getElementById("customerId").value = currentUser.customerId || "";
      }
    }

    document.getElementById("waiverForm").addEventListener("submit", saveWaiver);
    document.getElementById("customerSearchBtn").addEventListener("click", searchCustomer);
    document.getElementById("loadMyProfile").addEventListener("click", useMyAccount);
    document.getElementById("newWaiver").addEventListener("click", async () => {
      resetForm();
      await getNextWaiverId();
      showMessage("Ready for a new waiver.");
    });

    (async function init() {
      const user = await loadUser();
      if (!user) return;

      await getNextWaiverId();

      const today = new Date().toISOString().split("T")[0];
      document.getElementById("signedDate").value = today;
      document.getElementById("accepted").value = "true";

      if (user.role === "member" && user.customerId) {
        await loadCustomerById(user.customerId);
      }
    })();
  </script>
</body>
</html>
