<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga H'om • Class Records</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="layout--sidebar background">
  <aside class="sidebar">
    <a class="logo-wrap" href="/htmls/dashboard.html">
      <img src="../images/HomLogo.png" alt="Yoga H'om Logo" class="logo" />
    </a>

    <nav class="nav">
      <a id="dashboard" href="/htmls/dashboard.html">Dashboard</a>
      <a id="instructors" href="/htmls/instructor.html">Instructors</a>
      <a id="classes" href="/htmls/class-schedule.html">Classes</a>
      <a id="classCheckin" href="/htmls/class-checkin.html">Class Check-In</a>
      <a id="classRecords" href="/htmls/class-records.html" class="active">Class Records</a>
      <a id="customers" href="/htmls/customers.html">Customers</a>
      <a id="packageEdit" href="/htmls/package-edit.html">Packages</a>
      <a id="packageSales" href="/htmls/package-sales.html">Package Sales</a>
      <a id="userManagement" href="/htmls/user-management.html">User Management</a>
      <a id="waiver" href="/htmls/waiver.html">Waiver</a>
      <a id="logout" href="/logout">Logout</a>
    </nav>
  </aside>

  <main class="main-bg">
    <div class="overlay"></div>

    <section class="welcome-box" style="max-width: 1000px;">
      <h1>Class Records</h1>
      <p id="roleLabel"><strong>Role:</strong> Loading...</p>
      <p id="pageMessage" class="error-message" style="display:none;"></p>

      <div class="grid-2">
        <div id="recordFormSection">
          <h2>Update Record</h2>
          <form id="recordForm">
            <label for="checkinId">Check-In ID</label>
            <input type="text" id="checkinId" name="checkinId" readonly />

            <label for="customerId">Customer ID</label>
            <input type="text" id="customerId" name="customerId" required />

            <label for="classId">Class ID</label>
            <select id="classId" name="classId" class="styled-select" required>
              <option value="">Select class</option>
            </select>

            <label for="datetime">Check-In Date</label>
            <input type="date" id="datetime" name="datetime" required />

            <div class="btn-row">
              <button type="button" class="btn" id="updateRecord">Update Record</button>
              <button type="button" class="btn btn--danger" id="deleteRecord">Delete Record</button>
            </div>
          </form>
        </div>

        <div>
          <h2>Find Records</h2>

          <label for="searchRecord">Search by Check-In ID, Customer ID, or Class ID</label>
          <input type="text" id="searchRecord" placeholder="Enter CH001, C001, or A001" />

          <div class="btn-row" style="justify-content:flex-start; margin-top: 1rem;">
            <button type="button" class="btn btn--primary" id="searchRecordBtn">Search</button>
            <button type="button" class="btn" id="loadAllRecords">Load All</button>
          </div>

          <h2 style="margin-top: 1.5rem;">Record List</h2>
          <div id="recordList" style="text-align:left;"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const pageMessage = document.getElementById("pageMessage");

    function showMessage(message, isError = false) {
      pageMessage.textContent = message;
      pageMessage.style.display = "block";
      pageMessage.style.background = isError ? "#fdeaea" : "#e8f7ee";
      pageMessage.style.color = isError ? "#b42318" : "#166534";
      pageMessage.style.borderColor = isError ? "#f5c2c0" : "#b7ebc6";
    }

    function hideRestrictedLinks(user) {
      const memberHidden = [
        "instructors",
        "classRecords",
        "customers",
        "packageEdit",
        "packageSales",
        "userManagement"
    ];

      if (user.role === "member") {
        memberHidden.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = "none";
        });
      }
    }

    async function loadUser() {
      const res = await fetch("/api/me");
      if (!res.ok) {
        window.location.href = "/index.html";
        return null;
      }

      const user = await res.json();
      document.getElementById("roleLabel").innerHTML =
        "<strong>Role:</strong> " + (user.role || "Unknown");

      hideRestrictedLinks(user);

      if (user.role === "member") {
        showMessage("Members do not have access to Class Records.", true);
        document.getElementById("recordFormSection").style.display = "none";
        document.getElementById("searchRecord").style.display = "none";
        document.getElementById("searchRecordBtn").style.display = "none";
        document.getElementById("loadAllRecords").style.display = "none";
        return null;
      }

      return user;
    }

    async function loadClasses() {
      const res = await fetch("/api/class/getAll");
      const data = await res.json();

      const select = document.getElementById("classId");
      select.innerHTML = '<option value="">Select class</option>';

      if (Array.isArray(data)) {
        data.forEach(cls => {
          const option = document.createElement("option");
          option.value = cls.classId;
          option.textContent = `${cls.classId} - ${cls.className || ""}`;
          select.appendChild(option);
        });
      }
    }

    function fillForm(record) {
      document.getElementById("checkinId").value = record.checkinId || "";
      document.getElementById("customerId").value = record.customerId || "";
      document.getElementById("classId").value = record.classId || "";
      document.getElementById("datetime").value = record.datetime || "";
    }

    function renderRecordList(records) {
      const list = document.getElementById("recordList");

      if (!Array.isArray(records) || records.length === 0) {
        list.innerHTML = "<p>No class records found.</p>";
        return;
      }

      list.innerHTML = records.map(record => `
        <div class="card" style="max-width:none; margin-bottom: 1rem; padding: 1rem;">
          <strong>${record.checkinId}</strong><br>
          Customer: ${record.customerId}<br>
          Class: ${record.classId}<br>
          Date: ${record.datetime || ""}
          <div style="margin-top: 0.75rem;">
            <button class="btn btn--primary" onclick="selectRecord('${record.checkinId}')">Select</button>
          </div>
        </div>
      `).join("");
    }

    window.selectRecord = async function(checkinId) {
      const res = await fetch(`/api/classRecord/getRecord?checkinId=${encodeURIComponent(checkinId)}`);
      const data = await res.json();

      if (!res.ok) {
        showMessage(data.message || data.error || "Failed to load class record.", true);
        return;
      }

      fillForm(data);
      showMessage("Class record loaded.");
    };

    async function loadAllRecords() {
      const res = await fetch("/api/classRecord/getAll");
      const data = await res.json();
      renderRecordList(data);
    }

    async function searchRecord() {
      const search = document.getElementById("searchRecord").value.trim();

      if (!search) {
        showMessage("Enter a Check-In ID, Customer ID, or Class ID to search.", true);
        return;
      }

      const allRes = await fetch("/api/classRecord/getAll");
      const allData = await allRes.json();

      if (!allRes.ok || !Array.isArray(allData)) {
        renderRecordList([]);
        showMessage("Failed to search class records.", true);
        return;
      }

      const filtered = allData.filter(record =>
        (record.checkinId || "").toLowerCase().includes(search.toLowerCase()) ||
        (record.customerId || "").toLowerCase().includes(search.toLowerCase()) ||
        (record.classId || "").toLowerCase().includes(search.toLowerCase())
      );

      if (filtered.length === 0) {
        renderRecordList([]);
        showMessage("No class record found.", true);
        return;
      }

      renderRecordList(filtered);
    }

    async function updateRecord() {
      const payload = {
        checkinId: document.getElementById("checkinId").value.trim(),
        customerId: document.getElementById("customerId").value.trim(),
        classId: document.getElementById("classId").value,
        datetime: document.getElementById("datetime").value
      };

      const res = await fetch("/api/classRecord/updateRecord", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.message || data.error || "Failed to update class record.", true);
        return;
      }

      showMessage("Class record updated successfully.");
      await loadAllRecords();
    }

    async function deleteRecord() {
      const checkinId = document.getElementById("checkinId").value.trim();

      if (!checkinId) {
        showMessage("Select a class record first.", true);
        return;
      }

      const res = await fetch(`/api/classRecord/deleteRecord?checkinId=${encodeURIComponent(checkinId)}`, {
        method: "DELETE"
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.message || data.error || "Failed to delete class record.", true);
        return;
      }

      showMessage("Class record deleted successfully.");
      document.getElementById("recordForm").reset();
      await loadAllRecords();
    }

    document.getElementById("searchRecordBtn").addEventListener("click", searchRecord);
    document.getElementById("loadAllRecords").addEventListener("click", loadAllRecords);
    document.getElementById("updateRecord").addEventListener("click", updateRecord);
    document.getElementById("deleteRecord").addEventListener("click", deleteRecord);

    (async function init() {
      const user = await loadUser();
      if (!user) return;
      await loadClasses();
      await loadAllRecords();
    })();
  </script>
</body>
</html>
