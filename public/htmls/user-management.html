<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga H'om • User Management</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="layout--sidebar background">
  <aside class="sidebar">
    <a class="logo-wrap" href="/htmls/dashboard.html">
      <img src="../images/HomLogo.png" alt="Yoga H'om Logo" class="logo" />
    </a>

    <nav class="nav">
      <a id="dashboard" href="/htmls/dashboard.html">Dashboard</a>
      <a id="instructors" href="/htmls/instructor.html">Instructors</a>
      <a id="classes" href="/htmls/class-schedule.html">Classes</a>
      <a id="classCheckin" href="/htmls/class-checkin.html">Class Check-In</a>
      <a id="classRecords" href="/htmls/class-records.html">Class Records</a>
      <a id="customers" href="/htmls/customers.html">Customers</a>
      <a id="packageEdit" href="/htmls/package-edit.html">Packages</a>
      <a id="packageSales" href="/htmls/package-sales.html">Package Sales</a>
      <a id="userManagement" href="/htmls/user-management.html" class="active">User Management</a>
      <a id="waiver" href="/htmls/waiver.html">Waiver</a>
      <a id="logout" href="/logout">Logout</a>
    </nav>
  </aside>

  <main class="main-bg">
    <div class="overlay"></div>

    <section class="welcome-box" style="max-width: 1000px;">
      <h1>User Management</h1>
      <p id="roleLabel"><strong>Role:</strong> Loading...</p>
      <p id="pageMessage" class="error-message" style="display:none;"></p>

      <div class="grid-2">
        <div>
          <h2>Update User Role</h2>
          <form id="userForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" readonly />

            <label for="userId">User ID</label>
            <input type="text" id="userId" name="userId" readonly />

            <label for="customerId">Customer ID</label>
            <input type="text" id="customerId" name="customerId" readonly />

            <label for="role">Role</label>
            <select id="role" name="role" class="styled-select">
              <option value="member">Member</option>
              <option value="staff">Staff</option>
              <option value="admin">Admin</option>
            </select>

            <div class="btn-row">
              <button type="button" class="btn btn--primary" id="updateRole">Update Role</button>
            </div>
          </form>
        </div>

        <div>
          <h2>Find User</h2>

          <label for="searchUser">Search by Username, Role, User ID, or Customer ID</label>
          <input type="text" id="searchUser" placeholder="Enter username, role, AD001, ST001, or C001" />

          <div class="btn-row" style="justify-content:flex-start; margin-top: 1rem;">
            <button type="button" class="btn btn--primary" id="searchUserBtn">Search</button>
            <button type="button" class="btn" id="loadAllUsers">Load All</button>
          </div>

          <h2 style="margin-top: 1.5rem;">User List</h2>
          <div id="userList" style="text-align:left;"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const pageMessage = document.getElementById("pageMessage");

    function showMessage(message, isError = false) {
      pageMessage.textContent = message;
      pageMessage.style.display = "block";
      pageMessage.style.background = isError ? "#fdeaea" : "#e8f7ee";
      pageMessage.style.color = isError ? "#b42318" : "#166534";
      pageMessage.style.borderColor = isError ? "#f5c2c0" : "#b7ebc6";
    }

    function hideRestrictedLinks(user) {
      const memberHidden = [
        "instructors",
        "classRecords",
        "customers",
        "packageEdit",
        "packageSales",
        "userManagement"
    ];

      if (user.role === "member") {
        memberHidden.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = "none";
        });
      }

      if (user.role === "staff") {
        const roleSelect = document.getElementById("role");
        [...roleSelect.options].forEach(option => {
          if (option.value === "admin") option.disabled = true;
        });
      }
    }

    async function loadUser() {
      const res = await fetch("/api/me");
      if (!res.ok) {
        window.location.href = "/index.html";
        return null;
      }

      const user = await res.json();
      document.getElementById("roleLabel").innerHTML =
        "<strong>Role:</strong> " + (user.role || "Unknown");

      hideRestrictedLinks(user);

      if (user.role !== "admin" && user.role !== "staff") {
        showMessage("Members do not have access to User Management.", true);
        document.getElementById("userForm").style.display = "none";
        document.getElementById("searchUser").style.display = "none";
        document.getElementById("searchUserBtn").style.display = "none";
        document.getElementById("loadAllUsers").style.display = "none";
        return null;
      }

      return user;
    }

    function fillForm(user) {
      document.getElementById("username").value = user.username || "";
      document.getElementById("userId").value = user.userId || "";
      document.getElementById("customerId").value = user.customerId || "";
      document.getElementById("role").value = user.role || "member";
    }

    function renderUserList(users) {
      const list = document.getElementById("userList");

      if (!Array.isArray(users) || users.length === 0) {
        list.innerHTML = "<p>No users found.</p>";
        return;
      }

      list.innerHTML = users.map(user => `
        <div class="card" style="max-width:none; margin-bottom: 1rem; padding: 1rem;">
          <strong>${user.username}</strong><br>
          Role: ${user.role || ""}<br>
          User ID: ${user.userId || "N/A"}<br>
          Customer ID: ${user.customerId || "N/A"}
          <div style="margin-top: 0.75rem;">
            <button class="btn btn--primary" onclick="selectUser('${user.username}')">Select</button>
          </div>
        </div>
      `).join("");
    }

    window.selectUser = async function(username) {
      const res = await fetch(`/api/user/getUser?username=${encodeURIComponent(username)}`);
      const data = await res.json();

      if (!res.ok) {
        showMessage(data.message || data.error || "Failed to load user.", true);
        return;
      }

      fillForm(data);
      showMessage("User loaded.");
    };

    async function loadAllUsers() {
      const res = await fetch("/api/user/getAll");
      const data = await res.json();
      renderUserList(data);
    }

    async function searchUser() {
      const search = document.getElementById("searchUser").value.trim();

      if (!search) {
        showMessage("Enter a value to search.", true);
        return;
      }

      const res = await fetch(`/api/user/search?search=${encodeURIComponent(search)}`);
      const data = await res.json();

      if (!res.ok) {
        renderUserList([]);
        showMessage(data.message || "No user found.", true);
        return;
      }

      renderUserList(data);
    }

    async function updateRole() {
      const payload = {
        username: document.getElementById("username").value.trim(),
        role: document.getElementById("role").value
      };

      const res = await fetch("/api/user/updateRole", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.message || data.error || "Failed to update role.", true);
        return;
      }

      fillForm(data.user);
      showMessage("User role updated successfully.");
      await loadAllUsers();
    }

    document.getElementById("searchUserBtn").addEventListener("click", searchUser);
    document.getElementById("loadAllUsers").addEventListener("click", loadAllUsers);
    document.getElementById("updateRole").addEventListener("click", updateRole);

    (async function init() {
      const user = await loadUser();
      if (!user) return;
      await loadAllUsers();
    })();
  </script>
</body>
</html>
